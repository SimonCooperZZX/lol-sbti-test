<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL 职业选手灵魂测试</title>
    <style>
        :root {
            --primary-gold: #c8aa6e;
            --dark-blue: #091428;
            --accent-blue: #0ac8b9;
            --border-color: #3c3c41;
        }

        body {
            background-color: var(--dark-blue);
            color: #f0e6d2;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: #0a1428;
            border: 2px solid var(--primary-gold);
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .progress {
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .question-box h2 {
            font-size: 18px;
            color: var(--primary-gold);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .option-btn {
            display: block;
            width: 100%;
            background: rgba(200, 170, 110, 0.03);
            border: 1px solid var(--border-color);
            color: #cdbe91;
            padding: 16px;
            margin-bottom: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .option-btn:hover {
            background: rgba(200, 170, 110, 0.12);
            border-color: var(--primary-gold);
            color: #fff;
        }

        #resultPage { display: none; text-align: center; }
        
        /* 图片样式 */
        .player-img-container {
            width: 100%;
            margin: 20px 0;
            border: 1px solid var(--border-color);
            overflow: hidden;
            background: #000;
        }

        #resImg {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .result-header { color: var(--primary-gold); font-size: 14px; }
        .player-name {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(200, 170, 110, 0.6);
        }

        .labels-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .label-tag {
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 2px 12px;
            font-size: 12px;
        }

        .description {
            line-height: 1.8;
            font-size: 14px;
            color: #cdbe91;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-left: 4px solid var(--primary-gold);
            text-align: justify;
        }

        button.restart {
            width: 100%;
            margin-top: 30px;
            background: var(--primary-gold);
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            color: var(--dark-blue);
        }

        .hidden { display: none; }
    </style>
</head>

    let currentStep = 0;
    let scores = {};
    Object.keys(resultData).forEach(name => scores[name] = 0);

    function showQuestion() {
        if (currentStep >= questions.length) {
            showResult();
            return;
        }

        const q = questions[currentStep];
        document.getElementById('progressText').innerText = `Question ${currentStep + 1} / 15`;
        document.getElementById('questionTitle').innerText = q.title;
        
        const optionsDiv = document.getElementById('optionsGroup');
        optionsDiv.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                opt.score.forEach(name => {
                    if(scores.hasOwnProperty(name)) scores[name]++;
                });
                currentStep++;
                window.scrollTo({top: 0, behavior: 'smooth'});
                showQuestion();
            };
            optionsDiv.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quizPage').classList.add('hidden');
        document.getElementById('resultPage').style.display = 'block';

        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        document.getElementById('resPlayer').innerText = winner;
        document.getElementById('resDesc').innerText = resultData[winner].desc;
        
        // --- 核心修改：图片显示逻辑 ---
        const imgElement = document.getElementById('resImg');
        // 确保你的图片在 images/ 文件夹下，且名为 bin.jpg, faker.jpg 等
        imgElement.src = "images/" + resultData[winner].img + ".jpg";
        // -----------------------------

        const labelDiv = document.getElementById('resLabels');
        labelDiv.innerHTML = '';
        resultData[winner].labels.forEach(l => {
            const span = document.createElement('span');
            span.className = 'label-tag';
            span.innerText = l;
            labelDiv.appendChild(span);
        });
    }

    showQuestion();
